name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository with Git LFS
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Cache the Unity Library folder to speed up future builds
      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      # 3. Build the Unity Project for Android using GameCI
      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          buildName: VRLearningPlatform
          allowDirtyBuild: true

      # 4. Upload the generated APK as a GitHub Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VRLearningPlatform-Android-APK
          path: build/Android/
